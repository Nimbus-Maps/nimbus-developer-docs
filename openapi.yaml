  /titles/{titleId}/amenities:
    get:
      operationId: getTitleAmenities
      tags:
        - Titles
      summary: Find amenities reachable within a given travel time from a title
      description: |
        Returns key amenity properties (NHS hospitals, superstores, petrol stations,
        schools, railways) reachable from a title's centroid within a given travel time.

        Results are ordered by straight-line distance from the title's centroid,
        closest first. When `size` is less than the total number of matching properties,
        this ensures the nearest amenities of each type are returned.
      security:
        - OAuth2:
            - search.titles
      parameters:
        - name: titleId
          in: path
          required: true
          description: Title UUID
          schema:
            type: string
            format: uuid
          example: "96fab4d6-a9b1-4a29-86e6-feb0a0e9c859"
        - name: mode
          in: query
          required: false
          description: Travel mode
          schema:
            type: string
            enum: [car, foot]
            default: car
        - name: maxMinutes
          in: query
          required: false
          description: Maximum travel time in minutes (1–60)
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 15
        - name: size
          in: query
          required: false
          description: Maximum number of results (1–50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 25
      responses:
        "200":
          description: Amenities found within the travel time polygon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TitleAmenitiesResponse"
              example:
                titleId: "96fab4d6-a9b1-4a29-86e6-feb0a0e9c859"
                centroid:
                  lat: 51.4755
                  lon: -0.8632
                mode: "car"
