  /titles/{titleId}/travel-time-polygon:
    get:
      operationId: getTitleTravelTimePolygon
      tags:
        - Titles
      summary: Get the isochrone polygon for a title
      description: |
        Returns the GeoJSON polygon representing the area reachable from a title's
        centroid within a given travel time and mode.

        Use the returned `polygon` directly as a `geo_shape` filter in `POST /titles`
        to run any property search (with your own filters) within the travel time area:

        ```json
        POST /titles
        {
          "query": {
            "bool": {
              "filter": [
                { "geo_shape": { "geometry.centroid": { "shape": <polygon>, "relation": "within" } } },
                { "term": { "propertyCategory": "Residential" } }
              ]
            }
          }
        }
        ```
      security:
        - OAuth2:
            - search.titles
      parameters:
        - name: titleId
          in: path
          required: true
          description: Title UUID
          schema:
            type: string
            format: uuid
          example: "685ceaf1-5f9a-45ad-93fa-c15684589ed1"
        - name: mode
          in: query
          required: false
          description: Travel mode
          schema:
            type: string
            enum: [car, foot]
            default: car
        - name: maxMinutes
          in: query
          required: false
          description: Maximum travel time in minutes (1–60)
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 15
      responses:
        "200":
          description: Isochrone polygon for the title
          content:
            application/json:
              schema:
                type: object
                properties:
                  titleId:
                    type: string
                    format: uuid
                  centroid:
                    type: object
                    properties:
                      lat:
                        type: number
                      lon:
                        type: number
                  mode:
                    type: string
                    enum: [car, foot]
                  maxMinutes:
                    type: integer
                  polygon:
                    type: object
                    description: GeoJSON geometry (Polygon or MultiPolygon) — pass directly to geo_shape filter in POST /titles
              example:
                titleId: "685ceaf1-5f9a-45ad-93fa-c15684589ed1"
                centroid:
                  lat: 51.4755
                  lon: -0.8632
                mode: "car"
                maxMinutes: 10
                polygon:
                  type: "Polygon"
                  coordinates: [[[−0.95, 51.45], [−0.80, 51.45], [−0.80, 51.50], [−0.95, 51.50], [−0.95, 51.45]]]
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
