              schema:
                type: object
                properties:
                  titleId:
                    type: string
                    format: uuid
                  indexId:
                    type: string
                    description: Grid cell identifier
                  averages:
                    type: object
                    properties:
                      daily:
                        type: number
                      fridayNightout:
                        type: number
                      weekendDaytime:
                        type: number
                      rushHours:
                        type: number
                      officeHours:
                        type: number
                      nightHours:
                        type: number
                      sleepingHours:
                        type: number
                  monthly:
                    type: array
                    items:
                      type: object
                      properties:
                        year:
                          type: integer
                        month:
                          type: integer
                        daily:
                          type: number
                        fridayNightout:
                          type: number
                        weekendDaytime:
                          type: number
                        rushHours:
                          type: number
                        officeHours:
                          type: number
                        nightHours:
                          type: number
